          keyword_cn: 多模态大语言模型
          query: multimodal large language model test time adaptation
        - keyword: world model
          keyword_cn: 世界模型
          query: world model test time adaptation
      intent_queries:
        - query: Find papers on test time adaptation methods for pretrained vision language models
          query_cn: 查找预训练视觉语言模型的测试时自适应方法的相关论文
          enabled: true
          source: manual
          note: ''
        - query: Search for techniques that adapt multimodal large language models during inference without fine tuning
          query_cn: 搜索无需微调即可在推理时自适应多模态大语言模型的技术
          enabled: true
          source: manual
          note: ''
