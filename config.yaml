      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: embodied intelligence
          keyword_cn: 具身智能
          query: embodied intelligence generalization
        - keyword: world model
          keyword_cn: 世界模型
          query: world model generalization
        - keyword: generalization
